{% extends 'base.html' %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Productos destacados</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    {% for producto in productos %}
    <div class="bg-white p-4 rounded shadow">
        <h2 class="text-xl">{{ producto.nombre }}</h2>
        <p class="text-gray-600">${{ producto.precio }}</p>
        <a href="#" class="text-blue-500">Ver detalle</a>
    </div>
    {% empty %}
    <p>No hay productos aún. Ve al admin y añade algunos.</p>
    {% endfor %}
</div>
{% endblock %}
